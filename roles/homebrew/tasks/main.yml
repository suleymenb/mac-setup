- name: Ensure Homebrew is installed (best-effort)
  shell: |
    set -euo pipefail
    if ! command -v brew >/dev/null 2>&1; then
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Tap homebrew/cask-fonts
  community.general.homebrew_tap:
    name: homebrew/cask-fonts
    state: present

- name: Install brew formulae
  community.general.homebrew:
    name:
      - fzf
      - eza
    state: present
    update_homebrew: false

- name: Install brew casks
  community.general.homebrew_cask:
    name:
      - iterm2
      - rectangle
      - stats
      - font-jetbrains-mono
      - font-meslo-lg-nerd-font
    state: present

- name: Run fzf install
  shell: |
    set -euo pipefail
    "$(/usr/bin/env brew --prefix)/opt/fzf/install" --all --no-bash --no-fish
  args:
    executable: /bin/bash
  changed_when: false
